<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Agent Chat</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="layout">
      <aside class="panel sidebar">
        <div class="sidebar-head">
          <h2>Sohbetler</h2>
          <button id="new-chat-btn" type="button">+ Yeni</button>
        </div>
        <div id="chat-list" class="chat-list"></div>
      </aside>

      <section class="content">
        <section class="panel brand">
          <div class="topbar">
            <h1>Local Agent</h1>
            <a class="link-btn" href="/settings">Model Settings</a>
          </div>
          <p>Local Agent with Email Tools</p>
          <div class="status-row">
            <span class="label">Health</span>
            <span id="health-status" class="badge neutral">Kontrol ediliyor</span>
            <span class="label">Aktif Model</span>
            <span id="active-model-badge" class="badge neutral">-</span>
          </div>
        </section>

        <section class="panel controls">
          <label>
            Aktif Thread
            <input id="thread-id" type="text" readonly />
          </label>

          <label>
            Cevap Modeli
            <select id="model-select">
              <option value="">Aktif modeli kullan</option>
            </select>
          </label>

          <button id="refresh-models" type="button">Modelleri Yenile</button>
        </section>

        <section class="panel chat-wrap">
          <div id="chat-log" class="chat-log"></div>
          <form id="chat-form" class="composer">
            <textarea
              id="message-input"
              rows="3"
              placeholder="Mesajini yaz... (ornek: Saat kac?)"
            ></textarea>
            <button id="send-btn" type="submit">Gonder</button>
          </form>
        </section>
      </section>
    </main>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
